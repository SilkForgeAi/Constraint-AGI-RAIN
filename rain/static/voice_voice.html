<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rain — Voice Interface</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap');
  :root{--void:#030108;--plasma-cyan:#00f7ff;--plasma-magenta:#ff00e5;--plasma-gold:#ffd700;--plasma-violet:#8b5cf6;--plasma-green:#00ff88;--neural-pink:#ff3366;--text-primary:rgba(255,255,255,0.92);--text-dim:rgba(255,255,255,0.45);--glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--void);color:var(--text-primary);font-family:'Rajdhani',sans-serif;overflow:hidden;height:100vh;width:100vw;cursor:crosshair;}
  #canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}
  canvas{display:block;}
  .hud{position:fixed;z-index:10;pointer-events:none;}
  .hud-top{top:0;left:0;right:0;padding:20px 28px;display:flex;justify-content:space-between;align-items:flex-start;}
  .title-block h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:24px;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(135deg,var(--plasma-cyan),var(--plasma-magenta),var(--plasma-gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
  .title-block .subtitle{font-size:12px;letter-spacing:4px;color:var(--text-dim);margin-top:5px;text-transform:uppercase;}
  .dimension-readout{text-align:right;font-family:'Orbitron',sans-serif;}
  .dim-label{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;}
  .dim-value{font-size:38px;font-weight:700;color:var(--plasma-cyan);line-height:1;text-shadow:0 0 30px rgba(0,247,255,0.4);}
  .dim-unit{font-size:13px;color:var(--plasma-violet);letter-spacing:2px;}
  .hud-bottom{bottom:0;left:0;right:0;padding:20px 28px;display:flex;justify-content:space-between;align-items:flex-end;}
  .metrics-panel{text-align:right;}
  .metric{margin-bottom:6px;}
  .metric-label{font-size:9px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;}
  .metric-value{font-family:'Orbitron',sans-serif;font-size:15px;color:var(--plasma-green);}
  .scanline{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}
  .vignette{position:fixed;top:0;left:0;width:100%;height:100%;z-index:4;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,rgba(3,1,8,0.7) 100%);}
  .speech-display{position:fixed;top:75px;left:50%;transform:translateX(-50%);z-index:15;max-width:600px;width:90vw;text-align:center;pointer-events:none;}
  .speech-state{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;transition:color 0.3s;color:var(--text-dim);}
  .speech-state.speaking{color:var(--neural-pink);}
  .speech-state.thinking{color:var(--plasma-cyan);}
  .speech-text{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:400;color:var(--text-primary);letter-spacing:1.5px;line-height:1.6;opacity:0;transition:opacity 0.4s;max-height:120px;overflow:hidden;}
  .speech-text.visible{opacity:1;}
  .user-msg{font-size:12px;color:var(--plasma-cyan);letter-spacing:2px;margin-bottom:6px;opacity:0;transition:opacity 0.3s;text-transform:uppercase;}
  .user-msg.visible{opacity:0.6;}
  .waveform-bar{position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:14;display:flex;gap:2px;align-items:center;height:4px;opacity:0;transition:opacity 0.4s;}
  .waveform-bar.active{opacity:1;}
  .wf-bar{width:3px;height:2px;background:var(--neural-pink);border-radius:1px;transition:height 0.06s;}
  .voice-select-panel{position:fixed;top:50%;right:28px;transform:translateY(-50%);z-index:15;pointer-events:all;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .voice-select-label{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;writing-mode:vertical-rl;}
  .voice-level-bar{width:4px;height:80px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;position:relative;}
  .voice-level-fill{position:absolute;bottom:0;left:0;width:100%;height:0%;background:linear-gradient(to top,var(--neural-pink),var(--plasma-cyan));border-radius:2px;transition:height 0.06s;}
  .ai-chat-panel{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:20;width:560px;max-width:90vw;pointer-events:all;}
  .chat-input-wrap{display:flex;gap:0;background:rgba(3,1,8,0.85);border:1px solid var(--glass-border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:28px;overflow:hidden;transition:border-color 0.4s,box-shadow 0.4s;}
  .chat-input-wrap.speaking{border-color:var(--neural-pink);box-shadow:0 0 40px rgba(255,51,102,0.2),0 0 80px rgba(255,51,102,0.08);}
  .chat-input-wrap.thinking{border-color:var(--plasma-cyan);box-shadow:0 0 30px rgba(0,247,255,0.15);}
  #chat-input{flex:1;background:transparent;border:none;color:var(--text-primary);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:400;letter-spacing:1px;padding:14px 20px;outline:none;}
  #chat-input::placeholder{color:var(--text-dim);}
  #chat-send{background:transparent;border:none;color:var(--plasma-cyan);font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;padding:14px 20px;cursor:pointer;text-transform:uppercase;transition:color 0.3s,text-shadow 0.3s;}
  #chat-send:hover{color:var(--neural-pink);text-shadow:0 0 15px rgba(255,51,102,0.5);}
  #mic-btn{background:transparent;border:none;border-left:1px solid var(--glass-border);color:var(--text-dim);font-size:16px;padding:14px 16px;cursor:pointer;transition:color 0.3s,text-shadow 0.3s;line-height:1;}
  #mic-btn:hover{color:var(--plasma-cyan);}
  #mic-btn.listening{color:var(--neural-pink);text-shadow:0 0 12px rgba(255,51,102,0.7);animation:voicePulse 0.6s ease-in-out infinite;}
  @keyframes voicePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .ctrl-btn{background:var(--glass);border:1px solid var(--glass-border);color:var(--text-primary);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1.5px;padding:9px 14px;cursor:pointer;transition:all 0.3s ease;text-transform:uppercase;backdrop-filter:blur(10px);pointer-events:all;}
  .ctrl-btn:hover{background:rgba(0,247,255,0.1);border-color:var(--plasma-cyan);}
  .ctrl-btn.active{background:rgba(0,247,255,0.15);border-color:var(--plasma-cyan);color:var(--plasma-cyan);}
  .controls-panel{pointer-events:all;display:flex;gap:8px;flex-wrap:wrap;max-width:720px;}
</style>
</head>
<body>
<div id="canvas-container"></div>
<div class="scanline"></div>
<div class="vignette"></div>

<div class="hud hud-top">
  <div class="title-block">
    <h1>Rain</h1>
    <div class="subtitle">Voice Interface</div>
  </div>
  <div class="dimension-readout">
    <div class="dim-label">AI State</div>
    <div class="dim-value" id="dim-display">5D</div>
    <div class="dim-unit" id="ai-state-label">&rarr; idle</div>
  </div>
</div>

<div class="hud hud-bottom">
  <div class="controls-panel">
    <button class="ctrl-btn active" data-mode="neural" onclick="setMode('neural')">Neural Web</button>
    <button class="ctrl-btn" data-mode="probability" onclick="setMode('probability')">Probability</button>
    <button class="ctrl-btn" data-mode="tesseract" onclick="setMode('tesseract')">Hypercube</button>
    <button class="ctrl-btn" data-mode="kaluza" onclick="setMode('kaluza')">Kaluza-Klein</button>
    <button class="ctrl-btn" data-mode="worldlines" onclick="setMode('worldlines')">World Lines</button>
  </div>
  <div class="metrics-panel">
    <div class="metric"><div class="metric-label">Neural Activity</div><div class="metric-value" id="neural-val">0.000</div></div>
    <div class="metric"><div class="metric-label">Synapse Fire Rate</div><div class="metric-value" id="synapse-val">0 Hz</div></div>
    <div class="metric"><div class="metric-label">Voice Output</div><div class="metric-value" id="voice-val">silent</div></div>
    <div class="metric"><div class="metric-label">Consciousness</div><div class="metric-value" id="conscious-val">dormant</div></div>
  </div>
</div>

<div class="waveform-bar" id="waveform-bar"></div>

<div class="speech-display">
  <div class="user-msg" id="user-msg"></div>
  <div class="speech-state" id="speech-state">idle</div>
  <div class="speech-text" id="speech-text"></div>
</div>

<div class="voice-select-panel">
  <div class="voice-select-label">AI Voice</div>
  <div class="voice-level-bar"><div class="voice-level-fill" id="voice-level-fill"></div></div>
</div>

<div class="ai-chat-panel">
  <div class="chat-input-wrap" id="chat-wrap">
    <button id="mic-btn" onclick="toggleMic()" title="Voice input">🎤</button>
    <input type="text" id="chat-input" placeholder="Talk to Rain..." autocomplete="off" />
    <button id="chat-send" onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // ═══════════════════════════════
  // THREE.JS SCENE (identical to original)
  // ═══════════════════════════════
  const container=document.getElementById('canvas-container');
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(65,window.innerWidth/window.innerHeight,0.1,2000);
  camera.position.set(0,0,50);
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x030108,1);
  container.appendChild(renderer.domElement);

  let currentMode='neural',time=0,isDragging=false,rotX=0,rotY=0,targetRotX=0,targetRotY=0,prevMouse={x:0,y:0};
  let voiceAmplitude=0,voiceSmoothed=0,isSpeaking=false;
  let audioCtx=null,analyser=null,freqData=null;

  const groups={neural:new THREE.Group(),probability:new THREE.Group(),tesseract:new THREE.Group(),kaluza:new THREE.Group(),worldlines:new THREE.Group()};
  Object.values(groups).forEach(g=>scene.add(g));
  const glowMat=(c,o)=>new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o||0.8,side:THREE.DoubleSide});
  const lineMat=(c,o)=>new THREE.LineBasicMaterial({color:c,transparent:true,opacity:o||0.6});

  // Waveform bars
  const wfBar=document.getElementById('waveform-bar'),wfCount=48;
  for(let i=0;i<wfCount;i++){const b=document.createElement('div');b.className='wf-bar';wfBar.appendChild(b);}
  const wfBars=wfBar.querySelectorAll('.wf-bar');

  // Stars
  const stGeo=new THREE.BufferGeometry(),stN=2500,stP=new Float32Array(stN*3),stC=new Float32Array(stN*3);
  for(let i=0;i<stN;i++){stP[i*3]=(Math.random()-0.5)*800;stP[i*3+1]=(Math.random()-0.5)*800;stP[i*3+2]=(Math.random()-0.5)*800;const c=new THREE.Color().setHSL(Math.random()*0.2+0.5,0.5,0.6+Math.random()*0.4);stC[i*3]=c.r;stC[i*3+1]=c.g;stC[i*3+2]=c.b;}
  stGeo.setAttribute('position',new THREE.BufferAttribute(stP,3));stGeo.setAttribute('color',new THREE.BufferAttribute(stC,3));
  scene.add(new THREE.Points(stGeo,new THREE.PointsMaterial({size:0.8,vertexColors:true,transparent:true,opacity:0.7})));

  // Nebula
  const nbGeo=new THREE.BufferGeometry(),nbN=400,nbP=new Float32Array(nbN*3),nbC=new Float32Array(nbN*3);
  for(let i=0;i<nbN;i++){const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=20+Math.random()*60;nbP[i*3]=r*Math.sin(ph)*Math.cos(th);nbP[i*3+1]=r*Math.sin(ph)*Math.sin(th);nbP[i*3+2]=r*Math.cos(ph);const c=new THREE.Color().setHSL(0.75+Math.random()*0.3,0.8,0.3);nbC[i*3]=c.r;nbC[i*3+1]=c.g;nbC[i*3+2]=c.b;}
  nbGeo.setAttribute('position',new THREE.BufferAttribute(nbP,3));nbGeo.setAttribute('color',new THREE.BufferAttribute(nbC,3));
  const nebula=new THREE.Points(nbGeo,new THREE.PointsMaterial({size:3,vertexColors:true,transparent:true,opacity:0.12,blending:THREE.AdditiveBlending}));scene.add(nebula);

  // Neural Web
  const neurons=[],synapses=[],neuronCount=200,pulseParticles=[];
  const pulseGeo=new THREE.SphereGeometry(0.08,4,4);
  for(let i=0;i<neuronCount;i++){const layer=Math.floor(Math.random()*7),layerR=4+layer*3.5;const theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);const x=layerR*Math.sin(phi)*Math.cos(theta)*1.5,y=layerR*Math.sin(phi)*Math.sin(theta)*0.9,z=layerR*Math.cos(phi)*1.2;const size=0.1+(7-layer)*0.03+Math.random()*0.06;const hue=0.55+layer*0.055;const color=new THREE.Color().setHSL(hue,0.9,0.65);const mesh=new THREE.Mesh(new THREE.SphereGeometry(size,8,8),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.8}));mesh.position.set(x,y,z);groups.neural.add(mesh);const glow=new THREE.Mesh(new THREE.SphereGeometry(size*2.8,8,8),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.06,blending:THREE.AdditiveBlending}));glow.position.copy(mesh.position);groups.neural.add(glow);neurons.push({mesh,glow,layer,basePos:new THREE.Vector3(x,y,z),phase:Math.random()*Math.PI*2,fireRate:0.5+Math.random()*2,activation:0,color});}
  for(let i=0;i<neurons.length;i++){const ni=neurons[i];const conns=2+Math.floor(Math.random()*3);const cands=[];for(let j=0;j<neurons.length;j++){if(i===j)continue;const d=ni.basePos.distanceTo(neurons[j].basePos),ld=Math.abs(ni.layer-neurons[j].layer);if(d<20&&ld<=2)cands.push({idx:j,d,ld});}cands.sort((a,b)=>a.d+a.ld*5-(b.d+b.ld*5));for(let c=0;c<Math.min(conns,cands.length);c++){const j=cands[c].idx;if(synapses.some(s=>(s.from===i&&s.to===j)||(s.from===j&&s.to===i)))continue;const p1=ni.basePos,p2=neurons[j].basePos;const mid=p1.clone().lerp(p2,0.5).add(new THREE.Vector3((Math.random()-0.5)*3,(Math.random()-0.5)*3,(Math.random()-0.5)*3));const curve=new THREE.QuadraticBezierCurve3(p1,mid,p2);const pts=curve.getPoints(24);const geo=new THREE.BufferGeometry().setFromPoints(pts);const mat=new THREE.LineBasicMaterial({color:new THREE.Color().setHSL(0.55+ni.layer*0.05,0.7,0.35),transparent:true,opacity:0.12});const line=new THREE.Line(geo,mat);groups.neural.add(line);synapses.push({line,curve,from:i,to:j,baseOpacity:0.12,pulsePhase:Math.random()*Math.PI*2,active:false});}}
  function fireSynapse(idx){const syn=synapses[idx];if(syn.active)return;const pMat=new THREE.MeshBasicMaterial({color:0x00f7ff,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending});const pulse=new THREE.Mesh(pulseGeo,pMat);groups.neural.add(pulse);const trails=[];for(let t=0;t<5;t++){const tM=new THREE.MeshBasicMaterial({color:0xff3366,transparent:true,opacity:0.35-t*0.06,blending:THREE.AdditiveBlending});const tr=new THREE.Mesh(pulseGeo,tM);groups.neural.add(tr);trails.push(tr);}pulseParticles.push({mesh:pulse,trails,synapse:syn,progress:0,speed:0.012+Math.random()*0.01});syn.active=true;}

  // AI Core
  const coreMat=new THREE.MeshBasicMaterial({color:0xff3366,wireframe:true,transparent:true,opacity:0.15});
  const aiCore=new THREE.Mesh(new THREE.IcosahedronGeometry(2.2,3),coreMat);groups.neural.add(aiCore);
  const coreInner=new THREE.Mesh(new THREE.IcosahedronGeometry(1.0,2),new THREE.MeshBasicMaterial({color:0x00f7ff,transparent:true,opacity:0.3,blending:THREE.AdditiveBlending}));groups.neural.add(coreInner);
  const coreGlow=new THREE.Mesh(new THREE.SphereGeometry(3.5,16,16),new THREE.MeshBasicMaterial({color:0xff3366,transparent:true,opacity:0.04,blending:THREE.AdditiveBlending}));groups.neural.add(coreGlow);
  for(let d=0;d<16;d++){const pts=[];const dir=new THREE.Vector3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5).normalize();for(let s=0;s<=35;s++){const t=s/35;const p=dir.clone().multiplyScalar(t*28);p.x+=Math.sin(t*8+d)*2.5*t;p.y+=Math.cos(t*6+d*0.7)*2*t;p.z+=Math.sin(t*10+d*1.3)*1.8*t;pts.push(p);}const curve=new THREE.CatmullRomCurve3(pts);groups.neural.add(new THREE.Mesh(new THREE.TubeGeometry(curve,50,0.025,4,false),new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL((0.9+d*0.02)%1,0.8,0.4),transparent:true,opacity:0.18,blending:THREE.AdditiveBlending})));}

  // Other modes (compact, identical to original)
  const probNodes=[];function bPT(o,dir,dep,mx,sp){if(dep>mx)return;const len=4+Math.random()*3;const end=o.clone().add(dir.clone().multiplyScalar(len));const curve=new THREE.QuadraticBezierCurve3(o,o.clone().lerp(end,0.5).add(new THREE.Vector3((Math.random()-0.5)*2,(Math.random()-0.5)*2,(Math.random()-0.5)*2)),end);const h=0.5+dep*0.08+Math.random()*0.1;const col=new THREE.Color().setHSL(h,0.9,0.6);groups.probability.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(20)),lineMat(col,0.7-dep*0.08)));const nd=new THREE.Mesh(new THREE.SphereGeometry(0.2+(mx-dep)*0.1,8,8),glowMat(col,0.8));nd.position.copy(end);groups.probability.add(nd);probNodes.push({mesh:nd,phase:Math.random()*Math.PI*2});const br=2+(Math.random()>0.6?1:0);for(let i=0;i<br;i++){bPT(end,dir.clone().applyAxisAngle(new THREE.Vector3(Math.random(),Math.random(),Math.random()).normalize(),sp*(0.5+Math.random())).normalize(),dep+1,mx,sp*0.9);}}
  for(let t=0;t<5;t++){const a=(t/5)*Math.PI*2;bPT(new THREE.Vector3(Math.cos(a)*2,Math.sin(a)*2,0),new THREE.Vector3(Math.cos(a),Math.sin(a),(Math.random()-0.5)*0.5).normalize(),0,5,0.8);}
  const nexus=new THREE.Mesh(new THREE.IcosahedronGeometry(1.5,2),new THREE.MeshBasicMaterial({color:0x00f7ff,wireframe:true,transparent:true,opacity:0.4}));groups.probability.add(nexus);groups.probability.add(new THREE.Mesh(new THREE.SphereGeometry(0.6,16,16),glowMat(0xff00e5,0.6)));
  const tv=[];for(let i=0;i<32;i++)tv.push([(i&1)?1:-1,(i&2)?1:-1,(i&4)?1:-1,(i&8)?1:-1,(i&16)?1:-1]);const te=[];for(let i=0;i<32;i++)for(let j=i+1;j<32;j++){let d=0;for(let k=0;k<5;k++)if(tv[i][k]!==tv[j][k])d++;if(d===1)te.push([i,j]);}const tLines=[],tSph=[];function p5D(v,a4,a5){const w=v[3]*Math.cos(a4)-v[4]*Math.sin(a4),u=v[3]*Math.sin(a4)+v[4]*Math.cos(a4),s=4/(4-w*Math.sin(a5)-u*Math.cos(a5)*0.5);return new THREE.Vector3(v[0]*s*8,v[1]*s*8,v[2]*s*8);}te.forEach((e,i)=>{const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(6),3));const l=new THREE.Line(g,lineMat(new THREE.Color().setHSL((i/te.length)*0.4+0.45,0.9,0.55),0.5));groups.tesseract.add(l);tLines.push({l,g,e});});tv.forEach((v,i)=>{const m=new THREE.Mesh(new THREE.SphereGeometry(0.15,6,6),glowMat(new THREE.Color().setHSL((i/32)*0.5+0.4,0.9,0.7),0.7));groups.tesseract.add(m);tSph.push(m);});
  const kkR=[];for(let i=0;i<200;i++){const x=(Math.random()-0.5)*40,y=(Math.random()-0.5)*40,z=(Math.random()-0.5)*40;const r=new THREE.Mesh(new THREE.TorusGeometry(0.3+Math.random()*0.3,0.04,8,16),glowMat(new THREE.Color().setHSL(0.05+Math.random()*0.15,0.9,0.5),0.6));r.position.set(x,y,z);r.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,0);groups.kaluza.add(r);kkR.push({mesh:r,basePos:new THREE.Vector3(x,y,z),phase:Math.random()*Math.PI*2,speed:0.5+Math.random()});}for(let i=0;i<80;i++){const a=Math.floor(Math.random()*kkR.length),b=Math.floor(Math.random()*kkR.length);if(a===b)continue;if(kkR[a].basePos.distanceTo(kkR[b].basePos)>15)continue;const pts=[];for(let t=0;t<=10;t++){const p=kkR[a].basePos.clone().lerp(kkR[b].basePos,t/10);p.x+=Math.sin(t*0.6)*0.5;p.y+=Math.cos(t*0.8)*0.5;pts.push(p);}groups.kaluza.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lineMat(0xffd700,0.08)));}groups.kaluza.add(new THREE.Mesh(new THREE.TorusGeometry(12,0.08,16,100),glowMat(0xffd700,0.2)));const bt2=new THREE.Mesh(new THREE.TorusGeometry(12,0.08,16,100),glowMat(0xff00e5,0.15));bt2.rotation.x=Math.PI/2;groups.kaluza.add(bt2);
  const wl=[];for(let i=0;i<30;i++){const pts=[];const bA=(i/30)*Math.PI*2,rad=3+Math.random()*15;for(let s=0;s<=100;s++){const t=s/100,y=(t-0.5)*50,sa=bA+t*Math.PI*4+Math.sin(t*8)*0.5,r=rad+Math.sin(t*Math.PI*6)*2;pts.push(new THREE.Vector3(Math.cos(sa)*r,y,Math.sin(sa)*r));}const curve=new THREE.CatmullRomCurve3(pts);const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,100,0.06,4,false),glowMat(new THREE.Color().setHSL((i/30)*0.6+0.3,0.8,0.5),0.4));groups.worldlines.add(tube);wl.push({mesh:tube,phase:Math.random()*Math.PI*2});}groups.worldlines.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-30,0),new THREE.Vector3(0,30,0)]),lineMat(0x00f7ff,0.3)));const cGe=new THREE.ConeGeometry(15,25,32,1,true),cMa=new THREE.MeshBasicMaterial({color:0x00f7ff,transparent:true,opacity:0.04,side:THREE.DoubleSide,wireframe:true});const cn1=new THREE.Mesh(cGe,cMa);cn1.position.y=12.5;groups.worldlines.add(cn1);const cn2=new THREE.Mesh(cGe.clone(),cMa.clone());cn2.position.y=-12.5;cn2.rotation.x=Math.PI;groups.worldlines.add(cn2);
  function setGV(m){Object.entries(groups).forEach(([k,g])=>g.visible=k===m);}setGV('neural');

  // ═══════════════════════════════
  // AUDIO: Web Audio analyser for ElevenLabs playback (NO oscillators / NO music)
  // ═══════════════════════════════
  function ensureAudioCtx(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.8;freqData=new Uint8Array(analyser.frequencyBinCount);}if(audioCtx.state==='suspended')audioCtx.resume();}

  function connectAudioToAnalyser(audioEl){
    ensureAudioCtx();
    try{const src=audioCtx.createMediaElementSource(audioEl);src.connect(analyser);analyser.connect(audioCtx.destination);}catch(e){}
  }

  // ═══════════════════════════════
  // RAIN API (relative URLs — served from same origin)
  // ═══════════════════════════════
  let rainHistory=[];

  function stripForSpeech(s){
    if(!s)return'';
    return s.replace(/\[.*?\]/g,'').replace(/\*\*([^*]+)\*\*/g,'$1').replace(/^#+\s+/gm,'').replace(/`{1,3}[^`]*`{1,3}/g,'').replace(/\|[^\n]+\|/g,'').replace(/^[-*]\s+/gm,'. ').replace(/\n{2,}/g,'. ').replace(/\n/g,' ').replace(/\s+/g,' ').trim().slice(0,4500);
  }

  let currentAudio=null;

  async function speakElevenLabs(text,onDone){
    const clean=stripForSpeech(text);
    if(!clean){if(onDone)onDone();return;}
    isSpeaking=true;
    document.getElementById('chat-wrap').classList.add('speaking');
    document.getElementById('speech-state').className='speech-state speaking';
    document.getElementById('speech-state').textContent='speaking';
    document.getElementById('ai-state-label').innerHTML='&rarr; SPEAKING';
    wfBar.classList.add('active');
    try{
      const res=await fetch('/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:clean}),signal:AbortSignal.timeout(120000)});
      if(!res.ok)throw new Error('TTS '+res.status);
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      currentAudio=new Audio(url);
      connectAudioToAnalyser(currentAudio);
      currentAudio.onended=()=>{
        isSpeaking=false;voiceAmplitude=0;
        document.getElementById('chat-wrap').classList.remove('speaking');
        document.getElementById('speech-state').className='speech-state';
        document.getElementById('speech-state').textContent='idle';
        document.getElementById('ai-state-label').innerHTML='&rarr; idle';
        wfBar.classList.remove('active');
        URL.revokeObjectURL(url);currentAudio=null;
        if(onDone)onDone();
      };
      currentAudio.onerror=()=>{isSpeaking=false;voiceAmplitude=0;URL.revokeObjectURL(url);currentAudio=null;if(onDone)onDone();};
      currentAudio.play();
    }catch(e){isSpeaking=false;if(onDone)onDone();}
  }

  async function fetchRainResponse(text){
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history:rainHistory.slice(-10),use_memory:false,use_tools:false}),signal:AbortSignal.timeout(300000)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    rainHistory=data.history||rainHistory;
    return data.response||'';
  }

  // ═══════════════════════════════
  // CHAT + MIC
  // ═══════════════════════════════
  let micRecognition=null,micListening=false;

  window.sendMessage=async function(){
    const input=document.getElementById('chat-input');const text=input.value.trim();if(!text)return;input.value='';
    document.getElementById('user-msg').textContent='> '+text;document.getElementById('user-msg').classList.add('visible');
    document.getElementById('chat-wrap').classList.add('thinking');
    document.getElementById('speech-state').className='speech-state thinking';document.getElementById('speech-state').textContent='Rain thinking...';
    document.getElementById('ai-state-label').innerHTML='&rarr; THINKING';
    let response;
    try{response=await fetchRainResponse(text);}catch(e){response='Rain is not reachable.';}
    document.getElementById('chat-wrap').classList.remove('thinking');
    const speechText=document.getElementById('speech-text');speechText.textContent=response;speechText.classList.add('visible');
    document.getElementById('speech-state').className='speech-state';document.getElementById('speech-state').textContent='idle';
    speakElevenLabs(response,null);
    setTimeout(()=>{speechText.classList.remove('visible');document.getElementById('user-msg').classList.remove('visible');},Math.max(response.length*75,3000)+2000);
  };

  document.getElementById('chat-input').addEventListener('keydown',(e)=>{if(e.key==='Enter')sendMessage();});

  window.toggleMic=function(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert('Speech recognition needs Chrome or Edge.');return;}
    if(micListening){micListening=false;if(micRecognition)micRecognition.stop();document.getElementById('mic-btn').classList.remove('listening');document.getElementById('chat-input').placeholder='Talk to Rain...';return;}
    micRecognition=new SR();micRecognition.lang='en-US';micRecognition.interimResults=false;micRecognition.maxAlternatives=1;micRecognition.continuous=false;
    micRecognition.onstart=()=>{micListening=true;document.getElementById('mic-btn').classList.add('listening');document.getElementById('chat-input').placeholder='Listening...';document.getElementById('speech-state').className='speech-state thinking';document.getElementById('speech-state').textContent='listening...';};
    micRecognition.onresult=(event)=>{const transcript=event.results[0][0].transcript.trim();if(transcript){document.getElementById('chat-input').value=transcript;setTimeout(()=>window.sendMessage(),150);}};
    micRecognition.onerror=()=>{micListening=false;document.getElementById('mic-btn').classList.remove('listening');document.getElementById('chat-input').placeholder='Talk to Rain...';document.getElementById('speech-state').className='speech-state';document.getElementById('speech-state').textContent='idle';};
    micRecognition.onend=()=>{micListening=false;document.getElementById('mic-btn').classList.remove('listening');document.getElementById('chat-input').placeholder='Talk to Rain...';};
    micRecognition.start();
  };

  window.setMode=function(mode){currentMode=mode;setGV(mode);document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));};

  // Interaction
  renderer.domElement.addEventListener('mousedown',e=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY};});
  renderer.domElement.addEventListener('mousemove',e=>{if(isDragging){targetRotY+=(e.clientX-prevMouse.x)*0.005;targetRotX+=(e.clientY-prevMouse.y)*0.005;prevMouse={x:e.clientX,y:e.clientY};}});
  renderer.domElement.addEventListener('mouseup',()=>isDragging=false);
  renderer.domElement.addEventListener('mouseleave',()=>isDragging=false);
  renderer.domElement.addEventListener('wheel',e=>{camera.position.z=Math.max(15,Math.min(100,camera.position.z+e.deltaY*0.03));});
  window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

  // ═══════════════════════════════
  // AUDIO ANALYSIS (reads real ElevenLabs audio — no oscillators)
  // ═══════════════════════════════
  function updateAudio(){
    if(analyser&&freqData&&isSpeaking){
      analyser.getByteFrequencyData(freqData);
      let sum=0;for(let i=0;i<freqData.length;i++)sum+=freqData[i];
      voiceAmplitude=sum/freqData.length/255;
      const bandSize=Math.floor(freqData.length/wfCount);
      wfBars.forEach((bar,i)=>{let bSum=0;for(let j=i*bandSize;j<(i+1)*bandSize&&j<freqData.length;j++)bSum+=freqData[j];const val=bSum/bandSize/255;bar.style.height=(2+val*18)+'px';bar.style.background=val>0.5?'#ff3366':val>0.2?'#00f7ff':'#ff3366';});
    }else{
      voiceAmplitude*=0.9;
      wfBars.forEach(bar=>bar.style.height='2px');
    }
    voiceSmoothed+=(voiceAmplitude-voiceSmoothed)*0.12;
    document.getElementById('voice-level-fill').style.height=(voiceSmoothed*100)+'%';
  }

  // ═══════════════════════════════
  // ANIMATION LOOP
  // ═══════════════════════════════
  let lastFire=0;
  function animate(){
    requestAnimationFrame(animate);time+=0.008;updateAudio();
    rotX+=(targetRotX-rotX)*0.05;rotY+=(targetRotY-rotY)*0.05;if(!isDragging)targetRotY+=0.0008;
    const ag=groups[currentMode];ag.rotation.x=rotX;ag.rotation.y=rotY;
    nebula.rotation.y=time*0.02;nebula.rotation.x=time*0.01;
    const vi=voiceSmoothed;

    if(currentMode==='neural'){
      const cs=1+Math.sin(time*3)*0.15+vi*1.2;aiCore.scale.setScalar(cs);aiCore.rotation.x=time*0.3+vi*3;aiCore.rotation.y=time*0.5;coreMat.opacity=0.15+vi*0.5;coreInner.scale.setScalar(1+vi*0.7+Math.sin(time*5)*0.1);coreInner.material.opacity=0.3+vi*0.5;coreGlow.scale.setScalar(3.5+vi*6);coreGlow.material.opacity=0.04+vi*0.12;
      neurons.forEach(n=>{const ba=Math.sin(time*n.fireRate+n.phase)*0.5+0.5;n.activation=ba*(0.2+vi*3);n.mesh.scale.setScalar(1+n.activation*0.8);n.mesh.material.opacity=0.35+n.activation*0.65;n.glow.scale.setScalar(2.8+n.activation*2.5);n.glow.material.opacity=0.03+n.activation*0.15;const br=Math.sin(time*0.5+n.phase)*0.3;n.mesh.position.copy(n.basePos).multiplyScalar(1+br*0.02+vi*0.04);n.glow.position.copy(n.mesh.position);});
      synapses.forEach(s=>{const w=Math.sin(time*2+s.pulsePhase)*0.5+0.5;s.line.material.opacity=s.baseOpacity+w*0.08+vi*0.4;});
      const fi=isSpeaking?Math.max(0.015,0.1-vi*0.08):0.12;if(time-lastFire>fi){const cnt=Math.max(1,Math.floor(vi*12)+1);for(let f=0;f<cnt;f++)fireSynapse(Math.floor(Math.random()*synapses.length));lastFire=time;}
      for(let i=pulseParticles.length-1;i>=0;i--){const p=pulseParticles[i];p.progress+=p.speed*(1+vi*2.5);if(p.progress>=1){groups.neural.remove(p.mesh);p.trails.forEach(t=>groups.neural.remove(t));p.synapse.active=false;pulseParticles.splice(i,1);if(vi>0.1||Math.random()<0.25){const dn=p.synapse.to;const cn=synapses.filter(s=>s.from===dn||s.to===dn);if(cn.length>0){const nx=cn[Math.floor(Math.random()*cn.length)];const ni=synapses.indexOf(nx);if(ni>=0)fireSynapse(ni);}}continue;}const pos=p.synapse.curve.getPoint(p.progress);p.mesh.position.copy(pos);p.mesh.material.opacity=0.9*(1-p.progress*0.5);p.mesh.scale.setScalar(1+vi*2);p.trails.forEach((tr,ti)=>{const tp=Math.max(0,p.progress-(ti+1)*0.04);tr.position.copy(p.synapse.curve.getPoint(tp));tr.scale.setScalar(0.8-ti*0.1);});}
    }
    if(currentMode==='probability'){nexus.rotation.x=time*0.5;nexus.rotation.y=time*0.7;probNodes.forEach(n=>n.mesh.scale.setScalar(1+Math.sin(time*2+n.phase)*0.3+vi*0.8));}
    if(currentMode==='tesseract'){const a4=time*0.5+vi*0.8,a5=time*0.3+vi*0.5;const pr=tv.map(v=>p5D(v,a4,a5));tSph.forEach((m,i)=>m.position.copy(pr[i]));tLines.forEach(({g,e})=>{const pa=g.attributes.position.array;const p1=pr[e[0]],p2=pr[e[1]];pa[0]=p1.x;pa[1]=p1.y;pa[2]=p1.z;pa[3]=p2.x;pa[4]=p2.y;pa[5]=p2.z;g.attributes.position.needsUpdate=true;});}
    if(currentMode==='kaluza'){kkR.forEach(r=>{r.mesh.rotation.z=time*r.speed;r.mesh.scale.setScalar(1+Math.sin(time*1.5+r.phase)*0.15+vi*0.5);});}
    if(currentMode==='worldlines'){wl.forEach(w=>w.mesh.material.opacity=0.3+Math.sin(time*1.5+w.phase)*0.15+vi*0.3);}

    camera.position.x=Math.sin(time*0.15)*2*(isDragging?0:1);camera.position.y=Math.cos(time*0.1)*1.5*(isDragging?0:1);camera.lookAt(0,0,0);
    document.getElementById('neural-val').textContent=(vi*3+Math.sin(time)*0.2).toFixed(3);
    document.getElementById('synapse-val').textContent=Math.floor(pulseParticles.length*12+vi*300)+' Hz';
    document.getElementById('voice-val').textContent=isSpeaking?(vi>0.05?(vi*100).toFixed(0)+' dB':'speaking...'):'silent';
    const st=vi>0.5?'AWAKENED':vi>0.25?'speaking':vi>0.05?'active':isSpeaking?'processing':'dormant';
    document.getElementById('conscious-val').textContent=st;document.getElementById('conscious-val').style.color=vi>0.3?'#ff3366':vi>0.1?'#00f7ff':'#00ff88';
    renderer.render(scene,camera);
  }
  animate();
})();
</script>
